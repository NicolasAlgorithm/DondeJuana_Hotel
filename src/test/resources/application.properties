spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Override: H2 uses its own default schema; do not forward ADMIN prefix in tests
spring.jpa.properties.hibernate.default_schema=

# JWT test defaults (needed for JwtService bean initialization)
security.jwt.secret=test-secret-for-jwt-with-at-least-32-chars-123456789
security.jwt.issuer=test-suite
security.jwt.expiration-minutes=30
