spring.application.name=mvcpersonas

# Thymeleaf external templates (keeps index.html in project root)
# In production you can override via APP_TEMPLATES_EXTERNAL_PREFIX
# Example: APP_TEMPLATES_EXTERNAL_PREFIX=file:/opt/app/
app.templates.external-prefix=${APP_TEMPLATES_EXTERNAL_PREFIX:file:./}
app.templates.cache=${APP_TEMPLATES_CACHE:false}

# Oracle Autonomous Database (TNS alias + Wallet)
# Wallet path is auto-detected at startup from project folder wallet/Wallet_DondeJuanaDB
# (or from TNS_ADMIN if defined).
# DB credentials are internal defaults for this academic project.
# You can still override them via environment variables in deployment.
spring.datasource.url=jdbc:oracle:thin:@dondejuanadb_medium
spring.datasource.username=${DB_USERNAME:HOTEL}
spring.datasource.password=${DB_PASSWORD:CODING-engineer0717}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Hikari pool tuning for concurrent load (k6)
spring.datasource.hikari.maximum-pool-size=40
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

# Session hardening
server.servlet.session.timeout=20m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

# JWT (set JWT_SECRET in production)
security.jwt.secret=${JWT_SECRET:change-this-secret-with-at-least-32-characters-1234567890}
security.jwt.issuer=dondejuana-hotel-api
security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:30}

# Avoid leaking internal exception details in error payloads
server.error.include-message=never
server.error.include-binding-errors=never
# Tables live in the ADMIN schema; the app connects as HOTEL.
# After running sql/grants_hotel.sql (grants + synonyms) this property can be
# removed if you prefer to rely on the private synonyms created for HOTEL.
spring.jpa.properties.hibernate.default_schema=ADMIN

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.project.hotel=INFO
