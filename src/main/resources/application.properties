spring.application.name=mvcpersonas

# Oracle Autonomous Database (TNS alias + Wallet)
# Required environment variables (see README for setup instructions):
#   TNS_ADMIN  - path to the Oracle wallet directory
#   DB_USERNAME - Oracle DB username (e.g. HOTEL)
#   DB_PASSWORD - Oracle DB password for DB_USERNAME
spring.datasource.url=jdbc:oracle:thin:@dondejuanadb_medium?TNS_ADMIN=${TNS_ADMIN}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.format_sql=true
# Tables live in the ADMIN schema; the app connects as HOTEL.
# After running sql/grants_hotel.sql (grants + synonyms) this property can be
# removed if you prefer to rely on the private synonyms created for HOTEL.
spring.jpa.properties.hibernate.default_schema=ADMIN

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.project.hotel=DEBUG
