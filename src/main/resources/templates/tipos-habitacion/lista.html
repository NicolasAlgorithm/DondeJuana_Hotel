<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Tipos de Habitaci&oacute;n - Hotel Donde Juana</title>
    <link rel="stylesheet" href="/css/design-system.css" th:href="@{/css/design-system.css}">
</head>
<body>
<div class="logout">
    <span sec:authentication="name"></span>
    &nbsp;|&nbsp;
    <form th:action="@{/logout}" method="post" class="inline-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="logout-btn">Cerrar sesi&oacute;n</button>
    </form>
</div>
<h1>Tipos de Habitaci&oacute;n</h1>
<div class="toolbar">
    <a class="btn btn-primary"
       sec:authorize="hasAuthority('tipohabitacion.crear')"
       th:href="@{/tipos-habitacion/nuevo}">+ Nuevo Tipo</a>
    <a class="btn btn-secondary" th:href="@{/}">Inicio</a>
</div>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Descripcion</th>
        <th>Precio por Noche</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="tipo : ${tipos}">
        <td th:text="${tipo.idTipo}"></td>
        <td th:text="${tipo.nombre}"></td>
        <td th:text="${tipo.descripcion}"></td>
        <td th:text="${#numbers.formatDecimal(tipo.precioNoche, 1, 2)}"></td>
        <td>
            <a class="btn btn-warning"
               sec:authorize="hasAuthority('tipohabitacion.editar')"
               th:href="@{/tipos-habitacion/editar/{id}(id=${tipo.idTipo})}">Editar</a>

            <form sec:authorize="hasAuthority('tipohabitacion.eliminar')"
                    th:action="@{/tipos-habitacion/eliminar/{id}(id=${tipo.idTipo})}"
                    method="post"
                    class="inline-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-danger"
                        onclick="return confirm('¿Eliminar este tipo de habitacion?')">Eliminar</button>
            </form>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(tipos)}">
        <td colspan="5" class="empty">No hay tipos de habitacion registrados.</td>
    </tr>
    </tbody>
</table>
</body>
</html>
