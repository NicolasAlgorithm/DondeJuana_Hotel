<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipo de Habitaci&oacute;n - Hotel Donde Juana</title>
    <link rel="stylesheet" href="/css/design-system.css" th:href="@{/css/design-system.css}">
</head>
<body>
<div class="shell">
    <div class="head">
        <div class="title-wrap">
            <p>Donde Juana · Cat&aacute;logo</p>
            <h1 th:text="${tipo.idTipo != null} ? 'Editar tipo de habitaci&oacute;n' : 'Nuevo tipo de habitaci&oacute;n'">Tipo de habitaci&oacute;n</h1>
        </div>
        <div class="toolbar">
            <a class="btn btn-light" th:href="@{/tipos-habitacion}">Volver al listado</a>
            <form th:action="@{/logout}" method="post" class="inline-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-logout">Cerrar sesi&oacute;n</button>
            </form>
        </div>
    </div>

    <div class="panel">
<form class="main-form" th:action="@{/tipos-habitacion/guardar}" th:object="${tipo}" method="post">
    <input type="hidden" th:field="*{idTipo}" />

    <label>Nombre *</label>
    <input type="text" th:field="*{nombre}" placeholder="Ej: Sencilla, Doble, Suite" />
    <span class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>

    <label>Descripci&oacute;n</label>
    <textarea th:field="*{descripcion}" rows="3" placeholder="Descripci&oacute;n del tipo de habitaci&oacute;n"></textarea>

    <label>Precio por Noche (COP) *</label>
    <input type="number" th:field="*{precioNoche}" step="0.01" min="0" placeholder="0.00" />
    <span class="error" th:if="${#fields.hasErrors('precioNoche')}" th:errors="*{precioNoche}"></span>

    <div class="actions" style="margin-top: 14px;">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a class="btn btn-secondary" th:href="@{/tipos-habitacion}">Cancelar</a>
    </div>
</form>
    </div>
</div>
</body>
</html>
