<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Donde Juana</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f5f5f5; }
        h1 { color: #333; }
        .menu { display: flex; gap: 20px; margin-top: 20px; }
        .card { background: white; border-radius: 8px; padding: 20px; min-width: 180px;
                text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .card a { text-decoration: none; color: #0066cc; font-size: 1.1em; font-weight: bold; }
        .card a:hover { text-decoration: underline; }
        .card p { color: #666; font-size: 0.9em; }
        .db-status { margin-top: 20px; padding: 10px 14px; border-radius: 6px; font-size: 0.9em; display: inline-block; }
        .db-ok { background: #e8f5e9; color: #1b5e20; border: 1px solid #a5d6a7; }
        .db-error { background: #fdecea; color: #b71c1c; border: 1px solid #ef9a9a; }
    </style>
</head>
<body>
<h1>&#127968; Hotel Donde Juana</h1>
<p>Bienvenido al sistema de gesti&oacute;n del hotel.</p>
<div th:class="${dbOk} ? 'db-status db-ok' : 'db-status db-error'">
    DB: <span th:text="${dbStatus}">...</span>
</div>
<div class="menu">
    <div class="card">
        <a th:href="@{/personas}">&#128100; Hu&eacute;spedes</a>
        <p>Gestionar clientes del hotel</p>
    </div>
    <div class="card">
        <a th:href="@{/tipos-habitacion}">&#128197; Tipos de Habitaci&oacute;n</a>
        <p>Gestionar tipos y precios</p>
    </div>
    <div class="card">
        <a th:href="@{/habitaciones}">&#128719; Habitaciones</a>
        <p>Gestionar habitaciones</p>
    </div>
    <div class="card">
        <a th:href="@{/reservas}">&#128203; Reservas</a>
        <p>Gestionar reservas</p>
    </div>
</div>
</body>
</html>
