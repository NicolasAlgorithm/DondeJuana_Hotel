<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Donde Juana</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/design-system.css" th:href="@{/css/design-system.css}">
</head>
<body>
<div class="container">
    <p class="eyebrow">Donde Juana</p>
    <h2>Iniciar sesi&oacute;n</h2>
    <p>Accede con tu usuario para continuar con la operaci&oacute;n del hotel.</p>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="form-group">
            <label for="username">Usuario</label>
            <input id="username" name="username" type="text" required>
        </div>

        <div class="form-group">
            <label for="password">Contrase&ntilde;a</label>
            <input id="password" name="password" type="password" required>
        </div>

        <button type="submit" class="btn btn-primary">Entrar</button>
    </form>

    <div th:if="${param.error}" class="msg error">
        Usuario o contrase&ntilde;a incorrectos.
    </div>

    <div th:if="${param.logout}" class="msg ok">
        Sesi&oacute;n cerrada correctamente.
    </div>
</div>
</body>
</html>
