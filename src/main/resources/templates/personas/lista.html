<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huespedes - Hotel Donde Juana</title>
    <link rel="stylesheet" th:href="@{/css/app-shell.css}">
</head>
<body class="app-shell">
<div class="app-layout">
    <aside class="sidebar">
        <div class="brand"><h1>Hotel<br>Donde Juana</h1></div>
        <nav class="nav-menu">
            <a class="nav-item" th:href="@{/panel-administrativo}"><span class="icon">🏠</span>Dashboard</a>
            <a class="nav-item active" th:href="@{/personas}"><span class="icon">👤</span>Huespedes</a>
            <a class="nav-item" th:href="@{/tipos-habitacion}"><span class="icon">🛏️</span>Tipos de Habitaciones</a>
            <a class="nav-item" th:href="@{/habitaciones}"><span class="icon">🚪</span>Habitaciones</a>
            <a class="nav-item" th:href="@{/reservas}"><span class="icon">📋</span>Reservas</a>
            <a class="nav-item" th:href="@{/calendario}"><span class="icon">📅</span>Calendario Interactivo</a>
        </nav>
        <div class="sidebar-footer">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="logout-pill">↩ Salir</button>
            </form>
        </div>
    </aside>

    <main class="content-area">
        <header class="top-header">
            <div class="top-meta">
                <span>🇨🇴 ES</span>
                <span id="current-date">16/04/2026</span>
            </div>
            <div class="user-chip">
                <span class="avatar" sec:authentication="name">U</span>
                <span>
                    <strong sec:authentication="name">Usuario</strong>
                    <small style="display:block;color:#7f7265;" sec:authentication="principal.authorities">ROL</small>
                </span>
                <span>▾</span>
            </div>
        </header>

        <h1 class="page-title">Huespedes</h1>
        <div class="toolbar">
            <a class="btn btn-primary"
               sec:authorize="hasAuthority('persona.crear')"
               th:href="@{/personas/nuevo}">+ Nuevo Hu&eacute;sped</a>
            <a class="btn" th:href="@{/}">Inicio</a>
        </div>

        <table class="data-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Tipo Doc.</th>
                <th>Documento</th>
                <th>Email</th>
                <th>Tel&eacute;fono</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="persona : ${personas}">
                <td th:text="${persona.idPersona}"></td>
                <td th:text="${persona.nombre}"></td>
                <td th:text="${persona.apellido}"></td>
                <td th:text="${persona.tipoDoc}"></td>
                <td th:text="${persona.documento}"></td>
                <td th:text="${persona.email}"></td>
                <td th:text="${persona.telefono}"></td>
                <td>
                    <div class="actions-inline">
                        <a class="btn-small btn-edit"
                           sec:authorize="hasAuthority('persona.editar')"
                           th:href="@{/personas/editar/{id}(id=${persona.idPersona})}">Editar</a>
                        <form sec:authorize="hasAuthority('persona.eliminar')"
                              th:action="@{/personas/eliminar/{id}(id=${persona.idPersona})}"
                              method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-small btn-danger"
                                    onclick="return confirm('¿Eliminar este huesped?')">Eliminar</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(personas)}">
                <td colspan="8" style="text-align:center;">No hay huespedes registrados.</td>
            </tr>
            </tbody>
        </table>
    </main>
</div>
<script>
    (function () {
        const currentDate = document.getElementById('current-date');
        if (currentDate) {
            currentDate.textContent = new Intl.DateTimeFormat('es-CO').format(new Date());
        }
    })();
</script>
</body>
</html>
