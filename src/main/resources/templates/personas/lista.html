<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huespedes - Hotel Donde Juana</title>
    <link rel="stylesheet" href="/css/design-system.css" th:href="@{/css/design-system.css}">
</head>
<body>
<div class="shell">
    <div class="head">
        <div class="title-wrap">
            <p>Donde Juana · Hu&eacute;spedes</p>
            <h1>Listado de hu&eacute;spedes</h1>
        </div>
        <div class="toolbar">
            <a class="btn btn-primary"
               sec:authorize="hasAuthority('persona.crear')"
               th:href="@{/personas/nuevo}">Nuevo hu&eacute;sped</a>
            <a class="btn btn-light" th:href="@{/}">Inicio</a>
            <form th:action="@{/logout}" method="post" class="inline-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-logout">Cerrar sesi&oacute;n</button>
            </form>
        </div>
    </div>

    <div class="panel table-wrap">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Tipo Doc.</th>
                <th>Documento</th>
                <th>Email</th>
                <th>Telefono</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="persona : ${personas}">
                <td th:text="${persona.idPersona}"></td>
                <td th:text="${persona.nombre}"></td>
                <td th:text="${persona.apellido}"></td>
                <td th:text="${persona.tipoDoc}"></td>
                <td th:text="${persona.documento}"></td>
                <td th:text="${persona.email}"></td>
                <td th:text="${persona.telefono}"></td>
                <td>
                    <a class="btn btn-warning"
                       sec:authorize="hasAuthority('persona.editar')"
                       th:href="@{/personas/editar/{id}(id=${persona.idPersona})}">Editar</a>

                    <form sec:authorize="hasAuthority('persona.eliminar')"
                          th:action="@{/personas/eliminar/{id}(id=${persona.idPersona})}"
                          method="post"
                          class="inline-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-danger"
                                onclick="return confirm('¿Eliminar este huesped?')">Eliminar</button>
                    </form>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(personas)}">
                <td colspan="8" class="empty">No hay hu&eacute;spedes registrados.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
