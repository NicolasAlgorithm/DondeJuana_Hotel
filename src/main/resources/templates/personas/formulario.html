<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huesped - Hotel Donde Juana</title>
    <link rel="stylesheet" href="/css/ui.css" th:href="">
</head>
<body>
<div class="app-shell">
    <div class="user-bar">
        <span sec:authentication="name"></span>
        <span>|</span>
        <form th:action="@{/logout}" method="post" class="inline-form-reset">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="logout-btn">Cerrar sesi&oacute;n</button>
        </form>
    </div>

    <h1 th:text="${persona.idPersona != null} ? 'Editar Huesped' : 'Nuevo Huesped'">Huesped</h1>

    <div th:if="${dbError}" class="error-box">
        <span th:text="${dbError}"></span>
    </div>

    <form class="main-form" th:action="@{/personas/guardar}" th:object="${persona}" method="post">
        <input type="hidden" th:field="*{idPersona}" />

        <label>Nombre *</label>
        <input type="text" th:field="*{nombre}" placeholder="Nombre" />
        <span class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>

        <label>Apellido *</label>
        <input type="text" th:field="*{apellido}" placeholder="Apellido" />
        <span class="error" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></span>

        <label>Tipo de Documento</label>
        <select th:field="*{tipoDoc}">
            <option value="">Seleccione una opci&oacute;n</option>
            <option value="CC">C&eacute;dula de Ciudadan&iacute;a</option>
            <option value="CE">C&eacute;dula de Extranjer&iacute;a</option>
            <option value="PAS">Pasaporte</option>
            <option value="TI">Tarjeta de Identidad</option>
        </select>

        <label>N&uacute;mero de Documento</label>
        <input type="text" th:field="*{documento}" placeholder="N&uacute;mero de documento" />

        <label>Email</label>
        <input type="email" th:field="*{email}" placeholder="correo@ejemplo.com" />
        <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>

        <label>Tel&eacute;fono</label>
        <input type="text" th:field="*{telefono}" placeholder="3001002003" />

        <div class="actions">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a class="btn btn-secondary" th:href="@{/personas}">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
