<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitacion - Hotel Donde Juana</title>
    <link rel="stylesheet" href="/css/design-system.css" th:href="@{/css/design-system.css}">
</head>
<body>
<div class="shell">
    <div class="head">
        <div class="title-wrap">
            <p>Donde Juana · Habitaciones</p>
            <h1 th:text="${habitacion.idHabitacion != null} ? 'Editar habitaci&oacute;n' : 'Nueva habitaci&oacute;n'">Habitaci&oacute;n</h1>
        </div>
        <div class="toolbar">
            <a class="btn btn-light" th:href="@{/habitaciones}">Volver al listado</a>
            <form th:action="@{/logout}" method="post" class="inline-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-logout">Cerrar sesi&oacute;n</button>
            </form>
        </div>
    </div>

    <div class="panel">
<div th:if="${error != null}" class="alert-error" th:text="${error}" style="margin-bottom: 12px;"></div>
<form class="main-form" th:action="@{/habitaciones/guardar}" th:object="${habitacion}" method="post">
    <input type="hidden" th:field="*{idHabitacion}" />

    <label>Numero de Habitacion *</label>
    <input type="text" th:field="*{numero}" placeholder="Ej: 101, 202" />
    <span class="error" th:if="${#fields.hasErrors('numero')}" th:errors="*{numero}"></span>

    <label>Tipo de Habitacion *</label>
    <select th:field="*{idTipoHabitacion}">
        <option value="">-- Seleccione un tipo --</option>
        <option th:each="tipo : ${tipos}"
                th:value="${tipo.idTipo}"
                th:text="${tipo.nombre + ' - $' + #numbers.formatDecimal(tipo.precioNoche, 1, 2)}">
        </option>
    </select>

    <label>Estado</label>
    <select th:field="*{estado}">
        <option value="">-- Seleccione estado --</option>
        <option th:each="est : ${estados}" th:value="${est}" th:text="${est}"></option>
    </select>

    <label>Descripcion</label>
    <textarea th:field="*{descripcion}" rows="3" placeholder="Descripcion de la habitacion"></textarea>

    <div class="actions" style="margin-top: 14px;">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a class="btn btn-secondary" th:href="@{/habitaciones}">Cancelar</a>
    </div>
</form>
    </div>
</div>
</body>
</html>
