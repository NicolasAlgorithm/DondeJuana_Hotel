<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitaciones - Hotel Donde Juana</title>
    <link rel="stylesheet" th:href="@{/css/app-shell.css}">
</head>
<body class="app-shell">
<div class="app-layout">
    <aside class="sidebar">
        <div class="brand"><h1>Hotel<br>Donde Juana</h1></div>
        <nav class="nav-menu">
            <a class="nav-item" th:href="@{/panel-administrativo}"><span class="icon">🏠</span>Dashboard</a>
            <a class="nav-item" th:href="@{/personas}"><span class="icon">👤</span>Huespedes</a>
            <a class="nav-item" th:href="@{/tipos-habitacion}"><span class="icon">🛏️</span>Tipos de Habitaciones</a>
            <a class="nav-item active" th:href="@{/habitaciones}"><span class="icon">🚪</span>Habitaciones</a>
            <a class="nav-item" th:href="@{/reservas}"><span class="icon">📋</span>Reservas</a>
            <a class="nav-item" th:href="@{/calendario}"><span class="icon">📅</span>Calendario Interactivo</a>
        </nav>
        <div class="sidebar-footer">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="logout-pill">↩ Salir</button>
            </form>
        </div>
    </aside>

    <main class="content-area">
        <header class="top-header">
            <div class="top-meta">
                <span>🇨🇴 ES</span>
                <span id="current-date">16/04/2026</span>
            </div>
            <div class="user-chip">
                <span class="avatar" sec:authentication="name">U</span>
                <span>
                    <strong sec:authentication="name">Usuario</strong>
                    <small style="display:block;color:#7f7265;" sec:authentication="principal.authorities">ROL</small>
                </span>
                <span>▾</span>
            </div>
        </header>

        <h1 class="page-title">Habitaciones</h1>
        <div class="toolbar">
            <a class="btn btn-primary"
               sec:authorize="hasAuthority('habitacion.crear')"
               th:href="@{/habitaciones/nuevo}">+ Nuevo Tipo</a>
            <a class="btn" th:href="@{/}">Inicio</a>
            <span id="polling-indicator" style="color:#6e6257;font-size:0.85rem;"></span>
        </div>

        <table id="tabla-habitaciones" class="data-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Numero</th>
                <th>Tipo</th>
                <th>Precio/noche</th>
                <th>Estado</th>
                <th>Descripci&oacute;n</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="habitacion : ${habitaciones}" th:data-id="${habitacion.idHabitacion}">
                <td th:text="${habitacion.idHabitacion}"></td>
                <td th:text="${habitacion.numero}"></td>
                <td th:text="${habitacion.tipoHabitacion.nombre}"></td>
                <td th:text="${#numbers.formatDecimal(habitacion.tipoHabitacion.precioNoche, 1, 2)}"></td>
                <td class="estado">
                    <span th:text="${habitacion.estado}" th:data-id="${habitacion.idHabitacion}" class="estado-badge">DISPONIBLE</span>
                </td>
                <td th:text="${habitacion.descripcion}"></td>
                <td>
                    <div class="actions-inline">
                        <form sec:authorize="hasAuthority('habitacion.estado.cambiar')"
                              th:action="@{/habitaciones/{id}/estado(id=${habitacion.idHabitacion})}"
                              method="post" class="estado-form">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <select name="estado">
                                <option th:each="est : ${estados}"
                                        th:value="${est}"
                                        th:text="${est}"
                                        th:selected="${est == habitacion.estado}"></option>
                            </select>
                            <button type="submit" class="btn-small btn-edit">Cambiar</button>
                        </form>
                        <a class="btn-small btn-edit"
                           sec:authorize="hasAuthority('habitacion.editar')"
                           th:href="@{/habitaciones/editar/{id}(id=${habitacion.idHabitacion})}">Editar</a>
                        <form sec:authorize="hasAuthority('habitacion.eliminar')"
                              th:action="@{/habitaciones/eliminar/{id}(id=${habitacion.idHabitacion})}"
                              method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-small btn-danger"
                                    onclick="return confirm('¿Eliminar esta habitacion?')">Eliminar</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(habitaciones)}">
                <td colspan="7" style="text-align:center;">No hay habitaciones registradas.</td>
            </tr>
            </tbody>
        </table>
    </main>
</div>

<script>
    const POLL_INTERVAL = 10000;
    const indicator = document.getElementById('polling-indicator');

    function actualizarEstadoBadge(idHabitacion, nuevoEstado) {
        const badge = document.querySelector('.estado-badge[data-id="' + idHabitacion + '"]');
        if (!badge) return;
        badge.textContent = nuevoEstado;

        const row = badge.closest('tr');
        if (row) {
            const select = row.querySelector('select[name="estado"]');
            if (select) select.value = nuevoEstado;
        }
    }

    function pollEstados() {
        fetch('/api/habitaciones', {credentials: 'same-origin'})
            .then(function (res) {
                if (res.status === 401 || res.status === 403) {
                    indicator.textContent = '(sesión expirada)';
                    return Promise.reject(res.status);
                }
                return res.ok ? res.json() : Promise.reject(res.status);
            })
            .then(function (habitaciones) {
                habitaciones.forEach(function (h) {
                    actualizarEstadoBadge(h.idHabitacion, h.estado);
                });
                indicator.textContent = '(actualizado: ' + new Date().toLocaleTimeString() + ')';
            })
            .catch(function (err) {
                if (err !== 401 && err !== 403) {
                    indicator.textContent = '(sin conexión)';
                }
            });
    }

    pollEstados();
    setInterval(pollEstados, POLL_INTERVAL);
    (function () {
        const currentDate = document.getElementById('current-date');
        if (currentDate) {
            currentDate.textContent = new Intl.DateTimeFormat('es-CO').format(new Date());
        }
    })();
</script>
</body>
</html>
