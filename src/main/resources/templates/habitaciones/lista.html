<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Habitaciones - Hotel Donde Juana</title>
    <link rel="stylesheet" href="/css/design-system.css" th:href="@{/css/design-system.css}">
</head>
<body>
<div class="logout">
    <span sec:authentication="name"></span>
    &nbsp;|&nbsp;
    <form th:action="@{/logout}" method="post" class="inline-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="logout-btn">Cerrar sesi&oacute;n</button>
    </form>
</div>
<h1>Habitaciones <span id="polling-indicator"></span></h1>
<div class="toolbar">
    <a class="btn btn-primary"
       sec:authorize="hasAuthority('habitacion.crear')"
       th:href="@{/habitaciones/nuevo}">+ Nueva Habitacion</a>
    <a class="btn btn-secondary" th:href="@{/}">Inicio</a>
</div>
<table id="tabla-habitaciones">
    <thead>
    <tr>
        <th>ID</th>
        <th>Numero</th>
        <th>Tipo</th>
        <th>Precio/Noche</th>
        <th>Estado</th>
        <th>Descripci&oacute;n</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="habitacion : ${habitaciones}" th:data-id="${habitacion.idHabitacion}">
        <td th:text="${habitacion.idHabitacion}"></td>
        <td th:text="${habitacion.numero}"></td>
        <td th:text="${habitacion.tipoHabitacion.nombre}"></td>
        <td th:text="${#numbers.formatDecimal(habitacion.tipoHabitacion.precioNoche, 1, 2)}"></td>
        <td>
            <span class="estado-badge"
                  th:classappend="'estado-' + ${habitacion.estado}"
                  th:text="${habitacion.estado}"
                  th:data-id="${habitacion.idHabitacion}">
            </span>
        </td>
        <td th:text="${habitacion.descripcion}"></td>
        <td>
            <form sec:authorize="hasAuthority('habitacion.estado.cambiar')"
                  th:action="@{/habitaciones/{id}/estado(id=${habitacion.idHabitacion})}"
                  method="post" class="estado-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <select name="estado" th:data-current="${habitacion.estado}">
                    <option th:each="est : ${estados}"
                            th:value="${est}"
                            th:text="${est}"
                            th:selected="${est == habitacion.estado}"></option>
                </select>
                <button type="submit" class="btn-sm">Cambiar</button>
            </form>

            <a class="btn btn-warning"
               sec:authorize="hasAuthority('habitacion.editar')"
               th:href="@{/habitaciones/editar/{id}(id=${habitacion.idHabitacion})}">Editar</a>

            <form sec:authorize="hasAuthority('habitacion.eliminar')"
                  th:action="@{/habitaciones/eliminar/{id}(id=${habitacion.idHabitacion})}"
                  method="post"
                  class="inline-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-danger"
                        onclick="return confirm('¿Eliminar esta habitacion?')">Eliminar</button>
            </form>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(habitaciones)}">
        <td colspan="7" class="empty">No hay habitaciones registradas.</td>
    </tr>
    </tbody>
</table>

<script>
    const POLL_INTERVAL = 10000; // 10 seconds
    const estadoClases = ['estado-DISPONIBLE','estado-RESERVADA','estado-OCUPADA','estado-MANTENIMIENTO'];
    const indicator = document.getElementById('polling-indicator');

    function actualizarEstadoBadge(idHabitacion, nuevoEstado) {
        const badge = document.querySelector('.estado-badge[data-id="' + idHabitacion + '"]');
        if (!badge) return;
        if (badge.textContent.trim() === nuevoEstado) return;
        badge.classList.remove(...estadoClases);
        badge.classList.add('estado-' + nuevoEstado);
        badge.textContent = nuevoEstado;

        // Also keep the dropdown in sync
        const row = badge.closest('tr');
        if (row) {
            const select = row.querySelector('select[name="estado"]');
            if (select) select.value = nuevoEstado;
        }
    }

    function pollEstados() {
        fetch('/api/habitaciones', { credentials: 'same-origin' })
            .then(function(res) {
                if (res.status === 401 || res.status === 403) {
                    indicator.textContent = '(sesión expirada)';
                    return Promise.reject(res.status);
                }
                return res.ok ? res.json() : Promise.reject(res.status);
            })
            .then(function(habitaciones) {
                habitaciones.forEach(function(h) {
                    actualizarEstadoBadge(h.idHabitacion, h.estado);
                });
                indicator.textContent = '(actualizado: ' + new Date().toLocaleTimeString() + ')';
            })
            .catch(function(err) {
                if (err !== 401 && err !== 403) {
                    indicator.textContent = '(sin conexión)';
                }
            });
    }

    pollEstados();
    setInterval(pollEstados, POLL_INTERVAL);
</script>
</body>
</html>
