<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reservas - Hotel Donde Juana</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f5f5f5; }
        h1 { color: #333; }
        table { border-collapse: collapse; width: 100%; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #0066cc; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .btn { display: inline-block; padding: 6px 14px; border-radius: 4px; text-decoration: none; margin: 2px; border: none; cursor: pointer; }
        .btn-primary { background: #0066cc; color: white; }
        .btn-warning { background: #f0a500; color: white; }
        .btn-danger { background: #cc0000; color: white; }
        .btn-secondary { background: #666; color: white; }
        .toolbar { margin-bottom: 16px; }
        .msg { margin-bottom: 12px; padding: 10px; border-radius: 6px; display: none; }
        .msg.ok { display: block; background: #e8f5e9; color: #1b5e20; border: 1px solid #a5d6a7; }
        .msg.error { display: block; background: #fdecea; color: #b71c1c; border: 1px solid #ef9a9a; }
    </style>
</head>
<body>
<h1>Reservas</h1>

<div id="msg" class="msg"></div>

<div class="toolbar">
    <a class="btn btn-primary" th:href="@{/reservas/nuevo}">+ Nueva Reserva</a>
    <a class="btn btn-secondary" th:href="@{/}">Inicio</a>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Huésped</th>
        <th>Habitación</th>
        <th>Fecha Inicio</th>
        <th>Fecha Fin</th>
        <th>Estado</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="reserva : ${reservas}">
        <td th:text="${reserva.idReserva}"></td>
        <td th:text="${reserva.persona.nombre + ' ' + reserva.persona.apellido}"></td>
        <td th:text="${reserva.habitacion.numero}"></td>
        <td th:text="${reserva.fechaEntrada}"></td>
        <td th:text="${reserva.fechaSalida}"></td>
        <td th:text="${reserva.estado}"></td>
        <td>
            <a class="btn btn-warning" th:href="@{/reservas/editar/{id}(id=${reserva.idReserva})}">Editar</a>

            <button class="btn btn-danger"
                    th:if="${!#strings.equalsIgnoreCase(reserva.estado, 'CANCELADA')}"
                    th:attr="data-id=${reserva.idReserva}"
                    onclick="cancelarReserva(this)">
                Cancelar
            </button>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(reservas)}">
        <td colspan="7" style="text-align:center; color:#999;">No hay reservas registradas.</td>
    </tr>
    </tbody>
</table>

<script>
    (function () {
        const msg = document.getElementById("msg");
        const params = new URLSearchParams(window.location.search);

        if (params.get("ok") === "1") {
            msg.className = "msg ok";
            msg.textContent = "Reserva guardada correctamente.";
        }

        window.cancelarReserva = async function (btn) {
            const id = btn.getAttribute("data-id");
            if (!id) return;

            if (!confirm("¿Cancelar esta reserva?")) return;

            msg.className = "msg";
            msg.textContent = "";

            try {
                const res = await fetch("/api/reservas/" + id + "/cancelar", {
                    method: "PATCH",
                    credentials: "same-origin"
                });

                const body = await res.json().catch(() => ({}));
                if (!res.ok) {
                    throw new Error(body.error || "No se pudo cancelar la reserva.");
                }

                window.location.href = "/reservas?ok=1";
            } catch (e) {
                msg.className = "msg error";
                msg.textContent = e.message;
            }
        };
    })();
</script>
</body>
</html>
