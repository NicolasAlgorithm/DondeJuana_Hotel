<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${reserva.idReserva != null} ? 'Editar Reserva' : 'Nueva Reserva'">Reserva</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f5f5f5; }
        h1 { color: #333; }
        form { background: white; padding: 24px; border-radius: 8px; max-width: 700px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        label { display: block; margin-top: 12px; font-weight: bold; color: #444; }
        input, select { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .error { color: #b71c1c; font-size: 0.9em; margin-top: 8px; }
        .ok { color: #1b5e20; font-size: 0.9em; margin-top: 8px; }
        .btn { display: inline-block; padding: 8px 18px; border-radius: 4px; text-decoration: none; margin-top: 16px; margin-right: 8px; cursor: pointer; border: none; font-size: 1em; }
        .btn-primary { background: #0066cc; color: white; }
        .btn-secondary { background: #666; color: white; }
        .btn-info { background: #0d9488; color: white; }
    </style>
</head>
<body>
<h1 th:text="${reserva.idReserva != null} ? 'Editar Reserva' : 'Nueva Reserva'">Reserva</h1>

<form id="reservaForm">
    <input type="hidden" id="idReserva" th:value="${reserva.idReserva}" />

    <label for="idPersona">Huésped *</label>
    <select id="idPersona" required>
        <option value="">-- Seleccione un huésped --</option>
        <option th:each="p : ${personas}"
                th:value="${p.idPersona}"
                th:selected="${reserva.persona != null and p.idPersona == reserva.persona.idPersona}"
                th:text="${p.nombre + ' ' + p.apellido}">
        </option>
    </select>

    <label for="idHabitacion">Habitación *</label>
    <select id="idHabitacion" required>
        <option value="">-- Seleccione una habitación --</option>
        <option th:each="h : ${habitaciones}"
                th:value="${h.idHabitacion}"
                th:selected="${reserva.habitacion != null and h.idHabitacion == reserva.habitacion.idHabitacion}"
                th:text="${'Hab. ' + h.numero + ' - ' + h.tipoHabitacion.nombre}">
        </option>
    </select>

    <label for="fechaEntrada">Fecha de Entrada *</label>
    <input type="date" id="fechaEntrada" th:value="${reserva.fechaEntrada}" required />

    <label for="fechaSalida">Fecha de Salida *</label>
    <input type="date" id="fechaSalida" th:value="${reserva.fechaSalida}" required />

    <label for="estado">Estado *</label>
    <select id="estado" required>
        <option value="CONFIRMADA" th:selected="${reserva.estado == null or #strings.equalsIgnoreCase(reserva.estado, 'CONFIRMADA')}">CONFIRMADA</option>
        <option value="CHECKIN" th:selected="${#strings.equalsIgnoreCase(reserva.estado, 'CHECKIN')}">CHECKIN</option>
        <option value="CHECKOUT" th:selected="${#strings.equalsIgnoreCase(reserva.estado, 'CHECKOUT')}">CHECKOUT</option>
        <option value="CANCELADA" th:selected="${#strings.equalsIgnoreCase(reserva.estado, 'CANCELADA')}">CANCELADA</option>
    </select>

    <div>
        <button type="button" id="btnDisponibilidad" class="btn btn-info">Validar disponibilidad</button>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a class="btn btn-secondary" th:href="@{/reservas}">Cancelar</a>
    </div>

    <div id="msg" class="error"></div>
</form>

<script>
    (function () {
        const form = document.getElementById("reservaForm");
        const msg = document.getElementById("msg");
        const btnDisponibilidad = document.getElementById("btnDisponibilidad");

        function setError(text) {
            msg.className = "error";
            msg.textContent = text;
        }

        function setOk(text) {
            msg.className = "ok";
            msg.textContent = text;
        }

        function clearMsg() {
            msg.className = "";
            msg.textContent = "";
        }

        function buildPayload() {
            const idPersona = document.getElementById("idPersona").value;
            const idHabitacion = document.getElementById("idHabitacion").value;
            const fechaEntrada = document.getElementById("fechaEntrada").value;
            const fechaSalida = document.getElementById("fechaSalida").value;
            const estado = document.getElementById("estado").value;

            if (!idPersona || !idHabitacion || !fechaEntrada || !fechaSalida || !estado) {
                throw new Error("Todos los campos marcados con * son obligatorios.");
            }
            if (fechaEntrada >= fechaSalida) {
                throw new Error("La fecha de entrada debe ser menor que la fecha de salida.");
            }

            return {
                idPersona: Number(idPersona),
                idHabitacion: Number(idHabitacion),
                fechaEntrada,
                fechaSalida,
                estado
            };
        }

        btnDisponibilidad.addEventListener("click", async function () {
            clearMsg();
            try {
                const payload = buildPayload();
                const idReserva = document.getElementById("idReserva").value;

                const qs = new URLSearchParams({
                    idHabitacion: String(payload.idHabitacion),
                    fechaEntrada: payload.fechaEntrada,
                    fechaSalida: payload.fechaSalida
                });

                if (idReserva) {
                    qs.append("idReservaExcluir", idReserva);
                }

                const res = await fetch("/api/reservas/disponibilidad?" + qs.toString(), {
                    method: "GET",
                    credentials: "same-origin"
                });

                const body = await res.json();

                if (!res.ok) {
                    throw new Error(body.error || "No se pudo validar disponibilidad.");
                }

                if (body.disponible) {
                    setOk("Disponible en ese rango de fechas.");
                } else {
                    setError("No disponible en ese rango de fechas.");
                }
            } catch (e) {
                setError(e.message);
            }
        });

        form.addEventListener("submit", async function (ev) {
            ev.preventDefault();
            clearMsg();

            try {
                const payload = buildPayload();
                const idReserva = document.getElementById("idReserva").value;

                const isEdit = !!idReserva;
                const url = isEdit ? "/api/reservas/" + idReserva : "/api/reservas";
                const method = isEdit ? "PUT" : "POST";

                const res = await fetch(url, {
                    method,
                    headers: { "Content-Type": "application/json" },
                    credentials: "same-origin",
                    body: JSON.stringify(payload)
                });

                const body = await res.json().catch(() => ({}));

                if (!res.ok) {
                    throw new Error(body.error || "No se pudo guardar la reserva.");
                }

                window.location.href = "/reservas?ok=1";
            } catch (e) {
                setError(e.message);
            }
        });
    })();
</script>
</body>
</html>
